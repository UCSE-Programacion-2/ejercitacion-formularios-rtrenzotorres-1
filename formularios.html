<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Heroes — Añadí tu super | Programación II</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Karla&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/formularios.css" />
  </head>
  <body>
    <!--
      Plantilla guía — Completá el markup según el frame «Añadir» de Figma.
      Recordá: los tests automáticos sólo miran este archivo y css/formularios.css.
    -->
    <div class="page-shell">
      <div class="top-bar">Descuentos 20%</div>

      <header class="brand-header">
        <p class="brand-title">DC Heroes</p>
      </header>

      <nav class="main-nav" aria-label="Principal">
        <a href="#">Contacto</a>
        <a href="#">Registrarme</a>
        <a href="#">Ingresar</a>
      </nav>

    <main class="page-main">
  <form class="hero-form" method="post" action="#">
  <h1>Añadí tu super!</h1>
  <p>Agregá tu personaje favorito completando las opciones.</p>

  <label for="nombre">Nombre *</label>
  <input type="text" id="nombre" name="nombre" required />
  

  <label for="especie">Especie *</label>
  <select id="especie" name="especie" required>
    <option value="">Especie</option>
    <option value="humano">Humano</option>
    <option value="alien">Alien</option>
    <option value="metahumano">Metahumano</option>
    <option value="androide">Androide</option>
  </select>

  <label for="fecha">Fecha</label>
  <input type="date" id="fecha" name="fecha" />

  <label for="foto">Foto</label>
  <input type="file" id="foto" name="foto" accept="image/*" />

  <label for="descripcion">Descripción</label>
  <textarea id="descripcion" name="descripcion"></textarea>

  <fieldset>
  <legend>Poderes</legend>

  <label>
    <input type="checkbox" name="poderes" value="volar" />
    Volar
  </label>

  <label>
    <input type="checkbox" name="poderes" value="superinteligencia" />
    SuperInteligencia
  </label>

  <label>
    <input type="checkbox" name="poderes" value="vista-rayo-laser" />
    Vista de rayo láser
  </label>

  <label>
    <input type="checkbox" name="poderes" value="billetera-gorda" />
    Billetera gorda
  </label>
</fieldset>

<fieldset>
  <legend>Tipo de personaje</legend>

  <label>
    <input type="radio" name="tipo-personaje" value="heroe" />
    Héroe / Heroina
  </label>

  <label>
    <input type="radio" name="tipo-personaje" value="villano" />
    Villano / Villana
  </label>
</fieldset>

  <button type="submit">Añadir</button>
</form>
</main>

      <footer class="site-footer">
        <p>Todos los derechos reservados - Renzo Hernan Torres </p>
        <a href="https://github.com/" class="footer-github">GitHub</a>
      </footer>
    </div>
  </body>
</html>
